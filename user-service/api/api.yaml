openapi: 3.0.3

info:
  title: User Service API
  version: 1.0.0

paths:
  /users:
    post:
      operationId: createUser
      summary: Create user

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'

      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'

  /users/ping:
    get:
      operationId: ping
      summary: Ping endpoint

      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'


components:
  schemas:
    CreateUserRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          minLength: 5
          format: email

    CreateUserResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean

    PingResponse:
      type: object
      required:
        - messages
      properties:
        messages:
          type: string
